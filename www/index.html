<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Audio Downloader</title>
    </head>
    <body id="appBody">
        <div id="background"></div>
        <div id="appInterface">
            <input id="urlInput" placeholder="Enter the URL to download audio">
            <audio id="audioPlayer" controls></audio>
            <select id="options" required>
                <option value="" disabled selected>Select Download Format</option>
            </select>
            <button id="loadAudio">Load Audio</button>
            <button id="downloadAudio">Download Audio</button>
            <button id="saveAudio">Save Audio to Music</button>
        </div>
        <div id="statusDiv">Internal Error</div>
        <p id="exitP">
            TRY : <button id="exitB">EXIT</button><span id = "OR_text"> OR <button id="testModeEnable">TEST</button></span> 
        </p>
        <script src="app.js"></script>
    </body>
</html>
